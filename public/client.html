<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>Sponty — live demo</title>
<style>
  :root {
    --bg: #13111c; --bg-warm: #221726; --card: #1e1b2b; --line: #2d2a42;
    --text: #f3f0f9; --muted: #9a95ad; --indigo: #7d75c4; --amber: #ffbc5c;
    --amber-soft: #ffd79a; --rose: #ff9e7a; --blue: #9fb7ff;
  }
  * { box-sizing: border-box; }
  body {
    margin: 0; background: var(--bg); color: var(--text);
    font-family: ui-rounded, "SF Pro Rounded", "Hiragino Maru Gothic ProN", system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
    transition: background .6s ease; padding: 26px 16px 48px;
  }
  body.is-on { background: var(--bg-warm); }
  .wrap { max-width: 920px; margin: 0 auto; }
  .brand { display: flex; align-items: center; justify-content: center; gap: 8px; font-weight: 700; font-size: 18px; letter-spacing: -.02em; margin-bottom: 6px; }
  .sub { text-align: center; color: var(--muted); font-size: 13px; margin-bottom: 24px; }
  .grid { display: grid; grid-template-columns: 1fr; gap: 22px; }
  @media (min-width: 760px) { .grid { grid-template-columns: 360px 1fr; align-items: start; } }

  /* phone */
  .phone { background: var(--card); border: 1px solid var(--line); border-radius: 26px; padding: 18px; transition: all .6s ease; }
  .phone.is-on { background: #2b1f2c; border-color: #43332f; box-shadow: 0 0 60px -16px rgba(255,188,92,.4); }
  .acting { display: flex; gap: 6px; flex-wrap: wrap; margin-bottom: 16px; }
  .chip { border: 1px solid var(--line); background: transparent; color: var(--muted); border-radius: 999px; padding: 6px 11px; font-size: 12.5px; font-weight: 600; cursor: pointer; font-family: inherit; }
  .chip.active { border-color: var(--indigo); color: var(--text); background: rgba(125,117,196,.14); }
  .btn-big {
    width: 150px; height: 150px; border-radius: 50%; border: none; cursor: pointer; display: block; margin: 4px auto 0;
    font-family: inherit; font-weight: 700; font-size: 14px; line-height: 1.25; color: var(--text);
    background: radial-gradient(circle at 50% 40%, #262339, #1c1a2b);
    box-shadow: 0 14px 30px -16px rgba(0,0,0,.9); transition: all .5s ease;
  }
  .btn-big.down { background: radial-gradient(circle at 50% 40%, #3a3556, #2a2742); color: var(--indigo); box-shadow: inset 0 2px 14px rgba(0,0,0,.4); }
  .btn-big.on { background: radial-gradient(circle at 50% 38%, var(--amber-soft), var(--amber)); color: #181522; box-shadow: 0 0 60px 4px rgba(255,188,92,.5); }
  .btn-big:active { transform: scale(.97); }
  .controls { margin-top: 16px; }
  .controls.hidden { display: none; }
  .lbl { font-size: 12px; color: var(--muted); text-align: center; margin: 0 0 7px; }
  select, .tog { font-family: inherit; }
  select { width: 100%; background: var(--bg); color: var(--text); border: 1px solid var(--line); border-radius: 10px; padding: 9px; font-size: 13px; }
  .tog { margin-top: 12px; width: 100%; display: flex; align-items: center; gap: 10px; background: transparent; border: 1px solid var(--line); border-radius: 13px; padding: 10px 12px; cursor: pointer; text-align: left; color: var(--text); }
  .tog.on { border-color: var(--rose); background: rgba(255,158,122,.1); }
  .box { width: 20px; height: 20px; border-radius: 6px; border: 1.5px solid #494563; flex-shrink: 0; display: grid; place-items: center; color: #181522; font-size: 12px; font-weight: 800; }
  .tog.on .box { background: var(--rose); border-color: var(--rose); }
  .tog small { display: block; color: var(--muted); font-size: 11px; margin-top: 1px; }

  .status { margin-top: 16px; border-radius: 16px; padding: 14px; border: 1px solid var(--line); background: #1a1729; transition: all .5s ease; }
  .status.on { background: #2c2012; border-color: #4a3618; }
  .status.heads_up { background: #161d30; border-color: #27314e; }
  .status h3 { margin: 0 0 6px; font-size: 14.5px; }
  .status p { margin: 0; font-size: 12.5px; color: var(--muted); line-height: 1.5; }
  .person { display: flex; align-items: center; gap: 10px; margin-top: 9px; }
  .av { width: 28px; height: 28px; border-radius: 50%; display: grid; place-items: center; font-weight: 700; font-size: 12px; color: #181522; flex-shrink: 0; }
  .person .t { margin-left: auto; font-size: 12px; color: var(--muted); }
  .join { margin-top: 12px; width: 100%; background: var(--blue); color: #101a2e; border: none; border-radius: 12px; padding: 10px; font-weight: 700; cursor: pointer; font-family: inherit; }

  /* god view */
  .panel h2 { font-size: 13px; font-weight: 700; letter-spacing: .05em; text-transform: uppercase; color: var(--muted); margin: 0 0 4px; }
  .panel .hint { font-size: 12.5px; color: #6f6a86; margin: 0 0 14px; line-height: 1.5; }
  .scen { display: flex; flex-wrap: wrap; gap: 8px; margin-bottom: 16px; }
  .row { background: var(--card); border: 1px solid var(--line); border-radius: 14px; padding: 11px 12px; margin-bottom: 9px; }
  .row.in { border-color: #39354f; }
  .row .top { display: flex; align-items: center; gap: 11px; }
  .row .name { font-weight: 600; font-size: 14px; flex: 1; }
  .badge { display: inline-flex; align-items: center; gap: 5px; padding: 3px 9px; border-radius: 999px; font-size: 11px; font-weight: 600; white-space: nowrap; }
  .switch { width: 48px; height: 27px; border-radius: 999px; border: none; cursor: pointer; padding: 3px; background: #312e47; flex-shrink: 0; display: flex; }
  .switch.on { background: var(--amber); justify-content: flex-end; }
  .knob { width: 21px; height: 21px; border-radius: 50%; background: #fff; box-shadow: 0 1px 3px rgba(0,0,0,.4); }
  .row .opts { display: flex; align-items: center; gap: 9px; margin-top: 10px; padding-left: 39px; flex-wrap: wrap; }
  .row select { width: auto; padding: 5px 8px; font-size: 12px; }
  .mini { display: inline-flex; align-items: center; gap: 6px; border: 1px solid var(--line); border-radius: 9px; padding: 5px 8px; font-size: 12px; font-weight: 600; color: var(--muted); cursor: pointer; background: transparent; font-family: inherit; }
  .mini.on { border-color: var(--rose); color: var(--rose); background: rgba(255,158,122,.12); }
  .mini .box { width: 14px; height: 14px; border-radius: 4px; }
  .foot { color: #56526b; font-size: 11.5px; text-align: center; margin-top: 18px; line-height: 1.5; }
  .err { background: #2a1620; border: 1px solid #5a2740; color: #ffb3c8; padding: 12px; border-radius: 12px; font-size: 13px; }
</style>
</head>
<body>
<div class="wrap">
  <div class="brand">🌙 sponty <span style="font-weight:500;color:var(--muted);font-size:13px;">live demo</span></div>
  <div class="sub">Talking to the real backend. The phone shows one person's privacy-safe view; the panel lets you play everyone.</div>
  <div id="app"><div class="err" style="display:none"></div></div>
</div>

<script>
const TIMES = ["18:00","19:00","20:00","21:00","later"];
const COLORS = { You:"#ffbc5c", Maya:"#ff9e7a", Jonas:"#7fb3ff", Sofia:"#c49bff", Leo:"#6fe0c0", Robin:"#ffd56b" };
const BADGES = {
  on:        { t:"it's on",            c:"#ffbc5c", bg:"#3a2a14" },
  heads_up:  { t:"heads-up to join",   c:"#9fb7ff", bg:"#1c2438" },
  pending:   { t:"hidden, waiting",    c:"#7d75c4", bg:"#211d36" },
  idle:      { t:"nothing — no idea",  c:"#5d5872", bg:"#1a1828" },
};

const state = { users: [], groupId: null, acting: null, statuses: {}, debug: null, ready: false };

async function api(path, method = "GET", body) {
  const res = await fetch(path, {
    method,
    headers: body ? { "Content-Type": "application/json" } : undefined,
    body: body ? JSON.stringify(body) : undefined,
  });
  if (!res.ok && res.status >= 500) throw new Error("server error " + res.status);
  return res.json();
}

async function seed() {
  const names = Object.keys(COLORS);
  const users = [];
  for (const name of names) users.push({ ...(await api("/api/users", "POST", { name, pushToken: "demo-" + name })), color: COLORS[name] });
  const group = await api("/api/groups", "POST", { name: "the squad", memberIds: users.map(u => u.id) });
  state.users = users;
  state.groupId = group.id;
  state.acting = users[0].id;
  state.ready = true;
}

function sigByUser(userId) {
  if (!state.debug) return null;
  return state.debug.activeSignals.find(s => s.userId === userId) || null;
}

async function press(userId, patch = {}) {
  const sig = sigByUser(userId) || {};
  const fromTime = patch.fromTime ?? sig.fromTime ?? "20:00";
  const oneOnOneOk = patch.oneOnOneOk ?? sig.oneOnOneOk ?? false;
  await api(`/api/groups/${state.groupId}/signals`, "POST", { userId, fromTime, oneOnOneOk });
  await refresh();
}
async function unpress(userId) {
  const fresh = await api(`/api/groups/${state.groupId}/status?userId=${userId}`);
  if (fresh.signalId) await api(`/api/signals/${fresh.signalId}?userId=${userId}`, "DELETE");
  await refresh();
}

async function refresh() {
  if (!state.ready) return;
  state.debug = await api(`/api/debug/groups/${state.groupId}`);
  for (const u of state.users) {
    state.statuses[u.id] = await api(`/api/groups/${state.groupId}/status?userId=${u.id}`);
  }
  render();
}

function scenario(which) {
  const find = n => state.users.find(u => u.name === n).id;
  const run = async () => {
    // clear everyone first
    for (const u of state.users) {
      // cancel via fresh status to get a valid id
      const fresh = await api(`/api/groups/${state.groupId}/status?userId=${u.id}`);
      if (fresh.signalId) await api(`/api/signals/${fresh.signalId}?userId=${u.id}`, "DELETE");
    }
    if (which === "group") { await press(find("You")); await press(find("Jonas")); await press(find("Sofia")); }
    if (which === "pair") { await press(find("You"), { oneOnOneOk: true }); await press(find("Maya"), { oneOnOneOk: true }); }
    if (which === "almost") { await press(find("You")); await press(find("Leo")); }
    await refresh();
  };
  run();
}

function av(name) { const c = COLORS[name] || "#888"; return `<span class="av" style="background:${c}">${name[0]}</span>`; }

function renderPhone() {
  const u = state.users.find(x => x.id === state.acting);
  const st = state.statuses[state.acting] || { status: "idle" };
  const sig = sigByUser(state.acting);
  const down = !!sig;
  const isOn = st.status === "on";

  const acting = state.users.map(x =>
    `<button class="chip ${x.id === state.acting ? "active" : ""}" onclick="state.acting='${x.id}';render()">${x.name}</button>`
  ).join("");

  let bigLabel = down ? "you're in,<br>quietly" : "I'm down<br>to chill";
  if (isOn) bigLabel = "✨<br>it's on";

  const controls = down ? `
    <div class="controls">
      <p class="lbl">free from</p>
      <select onchange="press('${state.acting}',{fromTime:this.value})">
        ${TIMES.map(t => `<option ${sig && sig.fromTime === t ? "selected" : ""} value="${t}">${t === "later" ? "later tonight" : t}</option>`).join("")}
      </select>
      <button class="tog ${sig && sig.oneOnOneOk ? "on" : ""}" onclick="press('${state.acting}',{oneOnOneOk:${!(sig && sig.oneOnOneOk)}})">
        <span class="box">${sig && sig.oneOnOneOk ? "✓" : ""}</span>
        <span>1-on-1's fine too<small>lets it trigger with just 2 of you</small></span>
      </button>
    </div>` : "";

  let status = "";
  if (st.status === "idle") {
    status = `<div class="status"><h3>all quiet</h3><p>Tap the moon. Nothing happens — and no one sees a thing — unless your people are quietly in too.</p></div>`;
  } else if (st.status === "pending") {
    status = `<div class="status"><h3>you're in — and invisible</h3><p>You'll only hear back if the lights come on. If they don't, no one ever knows you were down.</p></div>`;
  } else if (st.status === "on") {
    const ppl = st.participants.map(p => `<div class="person">${av(p.name === u.name ? "You" : p.name)}<span>${p.userId === state.acting ? "You" : p.name}</span><span class="t">${p.fromTime ? "from " + p.fromTime : ""}</span></div>`).join("");
    status = `<div class="status on"><h3 style="color:var(--amber-soft)">${st.mode === "pair" ? "just you two — and that's enough" : "it's on ✨"}</h3>${ppl}<p style="margin-top:10px">The rest of the squad got a heads-up to join.</p></div>`;
  } else if (st.status === "heads_up") {
    const ppl = st.participants.map(p => `<div class="person">${av(p.name)}<span>${p.name}</span><span class="t">${p.fromTime ? "from " + p.fromTime : ""}</span></div>`).join("");
    status = `<div class="status heads_up"><h3 style="color:var(--blue)">some of your people are chilling</h3><p>${st.earliestFrom ? "From " + st.earliestFrom + ". " : ""}Slide in if you feel like it.</p>${ppl}<button class="join" onclick="press('${state.acting}')">I'm in</button></div>`;
  }

  return `
    <div class="phone ${isOn ? "is-on" : ""}">
      <div class="acting">${acting}</div>
      <button class="btn-big ${isOn ? "on" : down ? "down" : ""}" onclick="${down ? `unpress('${state.acting}')` : `press('${state.acting}')`}">${bigLabel}</button>
      ${controls}
      ${status}
    </div>`;
}

function renderPanel() {
  const rows = state.users.map(u => {
    const sig = sigByUser(u.id);
    const down = !!sig;
    const st = state.statuses[u.id] || { status: "idle" };
    const b = BADGES[st.status] || BADGES.idle;
    const opts = down ? `
      <div class="opts">
        <select onchange="press('${u.id}',{fromTime:this.value})">
          ${TIMES.map(t => `<option ${sig.fromTime === t ? "selected" : ""} value="${t}">from ${t === "later" ? "later" : t}</option>`).join("")}
        </select>
        <button class="mini ${sig.oneOnOneOk ? "on" : ""}" onclick="press('${u.id}',{oneOnOneOk:${!sig.oneOnOneOk}})">
          <span class="box">${sig.oneOnOneOk ? "✓" : ""}</span>1-on-1 ok
        </button>
      </div>` : "";
    return `
      <div class="row ${down ? "in" : ""}">
        <div class="top">
          ${av(u.name)}
          <span class="name">${u.name}${u.id === state.acting ? ' <span style="color:#6f6a86;font-weight:500;font-size:11px">· shown on phone</span>' : ""}</span>
          <span class="badge" style="color:${b.c};background:${b.bg}">${b.t}</span>
          <button class="switch ${down ? "on" : ""}" onclick="${down ? `unpress('${u.id}')` : `press('${u.id}')`}"><span class="knob"></span></button>
        </div>
        ${opts}
      </div>`;
  }).join("");

  return `
    <div class="panel">
      <h2>Behind the scenes</h2>
      <p class="hint">You'd never see this in the real app. Flip your friends on and watch the lights come on. Each badge is exactly what lands on that person's phone.</p>
      <div class="scen">
        <button class="chip" onclick="scenario('group')">3 friends in</button>
        <button class="chip" onclick="scenario('pair')">2 + 1-on-1</button>
        <button class="chip" onclick="scenario('almost')">almost (stays hidden)</button>
        <button class="chip" onclick="scenario('clear')">clear</button>
      </div>
      ${rows}
      <p class="foot">In-memory demo · restart the server to wipe state. Pending signals never leak — only the /debug route (used here) can see them.</p>
    </div>`;
}

function render() {
  const anyOn = Object.values(state.statuses).some(s => s.status === "on");
  document.body.classList.toggle("is-on", anyOn);
  document.getElementById("app").innerHTML = `<div class="grid">${renderPhone()}${renderPanel()}</div>`;
}

(async function init() {
  try {
    await seed();
    await refresh();
    setInterval(refresh, 2500); // poll like a real client would
  } catch (e) {
    document.getElementById("app").innerHTML = `<div class="err">Couldn't reach the backend. Make sure it's running (<code>npm start</code>) and reload.<br><br>${e.message}</div>`;
  }
})();
</script>
</body>
</html>
